<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink | Patient Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="beti.css">
    <link rel="stylesheet" href="patient_dashboard.css">
</head>
<body>

    <div id="dashboard-view">
        <nav class="navbar">
            <h2>CareLink | Patient Dashboard</h2>
            <div class="nav-right">
                <span id="nav-patient-id">ID:</span>
                <button class="logout-btn" onclick="logoutPatient()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </nav>
        <div class="container" id="main-content">
            <h2 style='text-align:center; color: #666;'><i class="fa-solid fa-spinner fa-spin"></i> Loading Sanjeevni Data...</h2>
        </div>
    </div>

    <div id="scanner-view" style="display: none;">
        <i class="fa-solid fa-xmark close-btn" onclick="window.closeScannerView()"></i>
        
        <h2 style="margin-bottom: 20px; color: white; text-align: center;" id="scanner-title">Scan Medicine</h2>
        <div id="reader" style="width: 100%; max-width: 400px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden;"></div>
        
        <div class="beti-bubble" id="scanner-beti-bubble" style="margin-top: 20px; text-align: center;">
            <i class="fa-solid fa-robot"></i> Kripya dawai ka QR code dikhayein...
        </div>
    </div>

    <div id="beti-widget" style="position: fixed; bottom: 30px; right: 30px; display: flex; align-items: flex-end; gap: 15px; z-index: 9999;">
        <button id="lang-toggle-btn" onclick="window.toggleLang()" style="background: #00766c; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.3s; margin-bottom: 25px;">🌐 EN</button>
        
        <div id="beti-bubble" style="background: #ff4bb4; color: white; padding: 15px 20px; border-radius: 20px 20px 0px 20px; margin-bottom: 50px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none; max-width: 300px; text-align: right;">Hello!</div>
        
        <button id="beti-btn" onclick="window.activateBeti()" style="background: #ff4bb4; border: none; border-radius: 50%; width: 100px; height: 100px; font-size: 50px; cursor: pointer; box-shadow: 0 6px 20px rgba(255, 75, 180, 0.6); display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">👧</button>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const activePatientUser = localStorage.getItem("activeUser"); 
        if (!activePatientUser) window.location.href = "index.html"; 

        let html5QrCode;
        window.expectedMedName = null;
        window.expectedStorageKey = null;
        window.expectedInstruction = null;
        window.isProcessingScan = false;
        
        window.todaysAlarms = [];
        window.alreadyReminded = {};

        window.checkReminders = function(currentHour, currentMinute) {
            let currentTimeStr = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;
            window.todaysAlarms.forEach(alarm => {
                if (alarm.time === currentTimeStr && !window.alreadyReminded[alarm.medName + alarm.time]) {
                    
                    // FIXED: Now uses the global window.speak function from beti.js
                    window.speak(
                        `It is time! Please take your ${alarm.label} dose of ${alarm.medName}.`, 
                        `Time ho gaya hai! Kripya apni ${alarm.medName} ki ${alarm.label} wali dawai le lijiye.`
                    );

                    if (Notification.permission === "granted") {
                        new Notification("Medicine Time! ⏰", { body: `It is time for your ${alarm.label} dose of ${alarm.medName}.` });
                    }
                    window.alreadyReminded[alarm.medName + alarm.time] = true;
                }
            });
        };

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            let displayHours = hours % 12 || 12;

            if(document.getElementById('live-clock')) {
                document.getElementById('live-clock').innerText = `${displayHours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')} ${ampm}`;
                document.getElementById('live-date').innerText = now.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }

            if (seconds === 0) window.checkReminders(hours, minutes);
            return hours;
        }

        async function fetchRealData() {
            try {
                const q = query(collection(db, "patients"), where("username", "==", activePatientUser));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const data = querySnapshot.docs[0].data();
                    buildDynamicDashboard(data);
                }
            } catch (error) {
                console.error("Firebase Error:", error);
            }
        }

        function buildDynamicDashboard(patientData) {
            const container = document.getElementById('main-content');
            const durationDays = patientData.prescription?.durationDays || 5; 
            const medicines = patientData.prescription?.medicines || [];
            
            document.getElementById('nav-patient-id').innerText = "ID: " + activePatientUser;

            updateClock();
            window.todaysAlarms = []; 

            let html = `
                <div class="hero-section">
                    <div class="greeting">
                        <h1>Good Day, ${patientData.name.split(' ')[0]}</h1>
                    </div>
                    <div class="clock-container">
                        <div class="clock" id="live-clock">00:00</div>
                        <div class="date-text" id="live-date">---</div>
                    </div>
                </div>
                <div class="doctor-card">
                    <h3><i class="fa-solid fa-user-doctor"></i> ${patientData.doctorName || "Assigned Doctor"}</h3>
                </div>
                <h3 class="section-title">Treatment Progress Trackers</h3>`;

            medicines.forEach((med) => {
                let timesPerDay = 1; 
                
                if (med.times && Array.isArray(med.times) && med.times.length > 0) {
                    timesPerDay = med.times.length;
                    
                    med.times.forEach((exactTime, index) => {
                        let spokenLabel = med.labels && med.labels[index] ? med.labels[index] : "";
                        window.todaysAlarms.push({ 
                            time: exactTime, 
                            medName: med.name, 
                            label: spokenLabel 
                        });
                    });
                } else {
                    let freqText = (med.freq || "").toLowerCase();
                    if(freqText.includes("twice") || freqText.includes("1-0-1")) {
                        timesPerDay = 2;
                        window.todaysAlarms.push({ time: "09:00", medName: med.name, label: "morning" });
                        window.todaysAlarms.push({ time: "21:00", medName: med.name, label: "night" });
                    } else if(freqText.includes("thrice") || freqText.includes("1-1-1")) {
                        timesPerDay = 3;
                        window.todaysAlarms.push({ time: "09:00", medName: med.name, label: "morning" });
                        window.todaysAlarms.push({ time: "14:00", medName: med.name, label: "afternoon" });
                        window.todaysAlarms.push({ time: "21:00", medName: med.name, label: "night" });
                    } else {
                        window.todaysAlarms.push({ time: "09:00", medName: med.name, label: "scheduled" }); 
                    }
                }

                // Parse the specific days for THIS medicine
                let medDuration = parseInt(med.days) || 5; 
                let totalDoses = medDuration * timesPerDay;
                
                html += `
                <div class="tracker-container">
                    <div class="tracker-header">
                        <div><h3>${med.name}</h3><p>${med.freq}</p></div>
                        <span class="badge">Total: ${totalDoses} Doses</span>
                    </div>
                    <div class="dose-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 10px;">`;

                for (let i = 1; i <= totalDoses; i++) {
                    let storageKey = `taken_${activePatientUser}_${med.name.replace(/\s+/g, '_')}_${i}`;
                    let isTaken = localStorage.getItem(storageKey) === 'true';
                    
                    let boxClass = isTaken ? "box-taken" : "box-pending";
                    let clickAction = isTaken ? "" : `onclick="window.triggerScanner('${med.name}', '${storageKey}', '${med.instruction || med.freq}')"`;
                    
                    let innerContent = isTaken ? `<i class="fa-solid fa-check" style="color:white;"></i>` : i;
                    let style = isTaken ? "background-color:#28a745; color:white; border-color:#28a745;" : "border: 2px solid #ddd;";

                    html += `<div class="dose-box ${boxClass}" ${clickAction} style="width:50px; height:50px; display:flex; align-items:center; justify-content:center; border-radius:8px; cursor:pointer; font-size:14px; ${style}">${innerContent}</div>`;
                }
                html += `</div></div>`; 
            });

            container.innerHTML = html;
            setInterval(updateClock, 1000);
        }

        window.triggerScanner = function(medName, storageKey, instruction) {
            window.expectedMedName = medName;
            window.expectedStorageKey = storageKey;
            window.expectedInstruction = instruction;
            window.isProcessingScan = false;
            
            // Adjust UI for scanner
            document.getElementById('dashboard-view').style.display = "none";
            
            const scannerView = document.getElementById('scanner-view');
            scannerView.style.display = "flex";
            scannerView.style.flexDirection = "column";
            scannerView.style.alignItems = "center";
            scannerView.style.justifyContent = "center";
            scannerView.style.position = "fixed";
            scannerView.style.top = "0";
            scannerView.style.left = "0";
            scannerView.style.width = "100%";
            scannerView.style.height = "100%";
            scannerView.style.background = "rgba(0,0,0,0.95)";
            scannerView.style.zIndex = "1000";
            
            // FIXED: Use the new unified speak function
            window.speak(
                `Please scan your ${medName} medicine.`, 
                `AAP, kripya apni ${medName} dawai scan karein.`
            );

            html5QrCode = new Html5Qrcode("reader");
            
            // FIXED THE CAMERA BLACK SCREEN HERE: Changed "environment" to "user" for laptop testing
            html5QrCode.start({ facingMode: "user" }, { fps: 10, qrbox: 250 }, window.onScanSuccess)
            .catch(err => {
                console.error("Camera access failed:", err);
                alert("Camera access denied or no camera found. Please check permissions.");
            });
        };

        window.onScanSuccess = function(decodedText) {
            if (window.isProcessingScan) return;
            window.isProcessingScan = true;
            try {
                const sData = JSON.parse(decodedText);
                if (sData.n.toLowerCase() === window.expectedMedName.toLowerCase()) {
                    
                    // FIXED: Use the new unified speak function
                    window.speak(
                        `Yes, this is ${window.expectedMedName}. You need to take it ${window.expectedInstruction}.`, 
                        `Ji Yeh ${window.expectedMedName} hi hai. Isse ${window.expectedInstruction} lena hai.`
                    );

                    document.getElementById('scanner-beti-bubble').style.backgroundColor = "#28a745";
                    
                    localStorage.setItem(window.expectedStorageKey, 'true');

                    setTimeout(() => { 
                        window.closeScannerView(); 
                        setTimeout(() => fetchRealData(), 500); 
                    }, 5000);
                } else {
                    // FIXED: Use the new unified speak function
                    window.speak(
                        `Wait, you were supposed to take ${window.expectedMedName}, but this is ${sData.n}.`, 
                        `Rukiye, Aapko ${window.expectedMedName} leni thi, par yeh ${sData.n} hai.`
                    );

                    document.getElementById('scanner-beti-bubble').style.backgroundColor = "#dc3545";
                    setTimeout(() => window.closeScannerView(), 4000);
                }
            } catch (e) {
                window.speak("Invalid QR code.", "QR code galat hai.");
                setTimeout(() => window.closeScannerView(), 3000);
            }
        };

        window.closeScannerView = function() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => html5QrCode.clear()).catch(e => console.log(e));
            }
            document.getElementById('scanner-view').style.display = "none";
            document.getElementById('dashboard-view').style.display = "block";
            window.isProcessingScan = false;
        };

        window.logoutPatient = function() {
            localStorage.removeItem("activeUser");
            localStorage.removeItem("activeRole");
            window.location.href = "index.html";
        };

        window.onload = fetchRealData;
    </script>
    
    <script src="beti.js"></script>

</body>
</html>
