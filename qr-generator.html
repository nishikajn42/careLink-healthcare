<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CareLink | Factory QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .input-group { margin: 10px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ccc; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Medicine Factory QR Creator</h2>
    <div class="input-group">
        <input type="text" id="medName" placeholder="Medicine Name (e.g. Paracetamol)">
    </div>
    <button onclick="generateQR()">Generate Strip QR</button>

    <div id="qrcode"></div>
    <p style="color: #666; font-size: 0.9em;">Take a screenshot. This only contains the medicine name.</p>

    <script>
        function generateQR() {
            const qrcodeDiv = document.getElementById("qrcode");
            qrcodeDiv.innerHTML = ""; 

            const name = document.getElementById("medName").value.trim();
            if(!name) return alert("Please enter medicine name!");

            // SIRF NAAM (n) BHEJ RAHE HAIN
            const data = { n: name };

            new QRCode(qrcodeDiv, {
                text: JSON.stringify(data),
                width: 200, height: 200
            });
        }
    </script>
</body>
</html>
